<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido - PNB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --azul-primario: #002b5c;
            --azul-secundario: #004a8f;
            --azul-fondo: #001f3f;
            --beige-acento: #d4c9a8;
            --blanco: #ffffff;
            --texto: #1a1a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Fondo azul institucional + vector geométrico sutil */
            background-color: var(--azul-fondo);
            background-image: 
                linear-gradient(160deg, #001833 0%, #002a54 50%, #003570 100%),
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M40 0l40 40-40 40L0 40z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: cover, 120px 120px;
            background-attachment: fixed;
        }

        .login-container { 
            background: var(--blanco); 
            width: 100%; 
            max-width: 360px; 
            padding: 28px 24px; 
            border-radius: 8px; 
            box-shadow: 0 12px 32px rgba(0,0,0,0.35); 
            border-top: 4px solid var(--beige-acento);
            position: relative;
            z-index: 10;
        }
        .header { text-align: center; margin-bottom: 22px; }
        .header img { width: 80px; height: auto; margin-bottom: 8px; }
        .header h1 { color: var(--azul-primario); font-size: 1.2rem; font-weight: 700; }
        .header p { color: #5a5a5a; font-size: 0.78rem; margin-top: 4px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--texto); font-weight: 500; font-size: 0.85rem; }
        .form-group input { 
            width: 100%; padding: 11px 12px; border: 1px solid var(--beige-acento); 
            border-radius: 5px; font-size: 0.9rem; background: #f8f9fa; 
            color: var(--texto); transition: 0.2s;
        }
        .form-group input:focus { 
            outline: none; border-color: var(--azul-primario); 
            box-shadow: 0 0 0 2px rgba(0,43,92,0.1); 
        }
        .btn-acceso { 
            width: 100%; padding: 12px; background: var(--azul-primario); 
            color: var(--blanco); border: none; border-radius: 5px; 
            font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; margin-top: 6px;
        }
        .btn-acceso:hover { background: var(--azul-secundario); }
        .btn-acceso:disabled { background: #6c757d; cursor: not-allowed; }
        
        .mensaje { padding: 10px; margin-top: 12px; border-radius: 4px; text-align: center; font-size: 0.85rem; display: none; }
        .mensaje.error { background: #fde2e2; color: #b91c1c; border: 1px solid #fca5a5; }
        .mensaje.exito { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
        
        footer { text-align: center; margin-top: 16px; font-size: 0.7rem; color: #6b7280; }
        @media (max-width: 400px) { .login-container { padding: 20px 16px; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Logo_Polic%C3%ADa_Nacional_Bolivariana.svg/1200px-Logo_Polic%C3%ADa_Nacional_Bolivariana.svg.png" alt="Logo PNB">
            <h1>Sistema de Registro Policial</h1>
            <p>Policía Nacional Bolivariana | Acceso Restringido</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Institucional</label>
                <input type="email" id="email" placeholder="usuario@pnb.gob.ve" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-acceso" id="btn-acceso">Iniciar Sesión</button>
            <div id="mensaje" class="mensaje"></div>
        </form>

        <footer>&copy; 2026 PNB | Sistema Oficial</footer>
    </div>

    <script src="config.js"></script>
    <script src="index.js"></script>
</body>
</html>
