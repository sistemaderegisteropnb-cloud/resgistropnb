<style>
  :root { --primary: #002b5c; --secondary: #c5a028; --beige-border: #d4c9a8; }
  .search-box { padding: 16px; background: #f8fafc; border: 1.5px dashed var(--beige-border); border-radius: 8px; margin-bottom: 20px; }
  .search-row { display: flex; gap: 10px; }
  .search-row input { flex: 1; padding: 10px; border: 1.5px solid var(--beige-border); border-radius: 5px; }
  .search-row button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
  .search-msg { margin-top: 8px; font-size: 0.85rem; display: none; }
  .search-msg.error { color: #dc2626; }
  .search-msg.success { color: #15803d; }
  .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .data-item label { font-weight: 600; font-size: 0.8rem; color: #64748b; display: block; margin-bottom: 4px; }
  .data-item input, .data-item select, .data-item textarea { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 8px; font-size: 0.9rem; pointer-events: none; }
  .btn-eliminar { width: 100%; padding: 14px; background: #dc2626; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 1rem; }
  .btn-eliminar:hover { background: #b91c1c; }
  .btn-eliminar:disabled { background: #fca5a5; cursor: not-allowed; }
  .msg { padding: 12px; margin-top: 15px; border-radius: 5px; text-align: center; display: none; }
  .msg.success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
  .msg.error { background: #fde2e2; color: #b91c1c; border: 1px solid #fca5a5; }
  /* Modal */
  .elim-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
  .elim-modal-box { background: #fff; padding: 24px; border-radius: 8px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
  .elim-modal-box h4 { margin: 0 0 10px; color: var(--primary); }
  .elim-modal-box p { margin: 0 0 20px; color: #475569; line-height: 1.5; }
  .elim-btns { display: flex; gap: 10px; justify-content: center; }
  .btn-danger { background: #dc2626; color: #fff; border: none; padding: 10px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; }
  .btn-cancel { background: #94a3b8; color: #fff; border: none; padding: 10px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-cancel:hover { background: #64748b; }
  @media (max-width: 600px) { .search-row, .data-grid { flex-direction: column; grid-template-columns: 1fr; } }
</style>

<div class="card">
    <h3>🗑️ Eliminar Registro de Persona</h3>
    
    <div class="search-box">
        <label>Buscar por Cédula:</label>
        <div class="search-row">
            <input type="text" id="buscar-cedula-elim" placeholder="Ingrese 7 u 8 dígitos" maxlength="8">
            <button id="btn-buscar-elim">🔍 Buscar</button>
        </div>
        <div id="buscar-msg-elim" class="search-msg"></div>
    </div>

    <div id="elim-data-container" style="display: none;">
        <fieldset style="border: 1px solid var(--beige-border); border-radius: 8px; padding: 16px; margin-bottom: 18px; background: #fafbfc;">
            <legend>📋 Datos Encontrados</legend>
            <div class="data-grid" id="elim-fields"></div>
        </fieldset>
        <button id="btn-eliminar" class="btn-eliminar">🗑️ Eliminar Persona del Sistema</button>
        <div id="msg-elim" class="msg"></div>
    </div>
</div>

<!-- ✅ Modal de Confirmación -->
<div id="elim-modal" class="elim-modal">
    <div class="elim-modal-box">
        <h4>⚠️ Confirmar Eliminación</h4>
        <p id="elim-modal-text">¿Está seguro que desea eliminar esta persona del sistema? El registro se archivarán permanentemente en la tabla de eliminados.</p>
        <div class="elim-btns">
            <button id="btn-confirm-si" class="btn-danger">✅ Sí, Eliminar</button>
            <button id="btn-confirm-no" class="btn-cancel">❌ Cancelar</button>
        </div>
    </div>
</div>
