<style>
  :root { --primary: #002b5c; --secondary: #c5a028; --beige-border: #d4c9a8; }
  .search-box { padding: 16px; background: #f8fafc; border: 1.5px dashed var(--beige-border); border-radius: 8px; margin-bottom: 20px; }
  .search-box label { font-weight: 700; font-size: 0.95rem; margin-bottom: 8px; display: block; }
  .search-row { display: flex; gap: 10px; }
  .search-row input { flex: 1; padding: 10px; border: 1.5px solid var(--beige-border); border-radius: 5px; text-transform: uppercase; }
  .search-row button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
  .search-msg { margin-top: 8px; font-size: 0.85rem; display: none; }
  .search-msg.error { color: #dc2626; }
  .search-msg.success { color: #15803d; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .data-item label { font-weight: 600; font-size: 0.8rem; color: #64748b; display: block; margin-bottom: 4px; }
  .data-item input, .data-item select, .data-item textarea { width: 100%; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; padding: 8px; font-size: 0.9rem; pointer-events: none; }
  .img-preview { width: 100%; height: auto; max-height: 200px; object-fit: contain; border: 1px solid var(--beige-border); border-radius: 5px; margin-top: 4px; display: none; background: #fff; }
  .btn-eliminar { width: 100%; padding: 14px; background: #dc2626; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 1rem; }
  .btn-eliminar:hover { background: #b91c1c; }
  .btn-eliminar:disabled { background: #fca5a5; cursor: not-allowed; }
  .msg { padding: 12px; margin-top: 15px; border-radius: 5px; text-align: center; display: none; }
  .msg.success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
  .msg.error { background: #fde2e2; color: #b91c1c; border: 1px solid #fca5a5; }
  .elim-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
  .elim-modal-box { background: #fff; padding: 24px; border-radius: 8px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
  .elim-modal-box h4 { margin: 0 0 10px; color: var(--primary); }
  .elim-modal-box p { margin: 0 0 20px; color: #475569; line-height: 1.5; }
  .elim-btns { display: flex; gap: 10px; justify-content: center; }
  .btn-danger { background: #dc2626; color: #fff; border: none; padding: 10px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; }
  .btn-cancel { background: #94a3b8; color: #fff; border: none; padding: 10px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-cancel:hover { background: #64748b; }
  @media (max-width: 600px) { .search-row, .form-grid { flex-direction: column; } }
</style>

<div class="card">
    <h3>🗑️ Eliminar Vehículo</h3>
    
    <div class="search-box">
        <label>Buscar por Placa, Serial de Carrocería o Motor:</label>
        <div class="search-row">
            <input type="text" id="buscar-input-elim" placeholder="Ej: AA123BC o serial..." maxlength="20">
            <button id="btn-buscar-elim">🔍 Buscar</button>
        </div>
        <div id="buscar-msg-elim" class="search-msg"></div>
    </div>

    <div id="elim-data-container" style="display: none;">
        <fieldset style="border:1px solid var(--beige-border); border-radius:8px; padding:16px; margin-bottom:18px; background:#fafbfc;">
            <legend>📸 Fotografías del Registro</legend>
            <div class="form-grid">
                <div class="data-item"><label>Frontal</label><img id="elim-foto-frontal" class="img-preview"></div>
                <div class="data-item"><label>Trasera</label><img id="elim-foto-trasera" class="img-preview"></div>
                <div class="data-item"><label>Lado Derecho</label><img id="elim-foto-der" class="img-preview"></div>
                <div class="data-item"><label>Lado Izquierdo</label><img id="elim-foto-izq" class="img-preview"></div>
            </div>
        </fieldset>

        <fieldset style="border:1px solid var(--beige-border); border-radius:8px; padding:16px; margin-bottom:18px; background:#fafbfc;">
            <legend>📋 Identificación</legend>
            <div class="form-grid">
                <div class="data-item"><label>Placa</label><input id="elim-placa" readonly></div>
                <div class="data-item"><label>Serial Carrocería</label><input id="elim-serial-carro" readonly></div>
                <div class="data-item"><label>Serial Motor</label><input id="elim-serial-motor" readonly></div>
                <div class="data-item"><label>Color</label><input id="elim-color" readonly></div>
            </div>
        </fieldset>

        <fieldset style="border:1px solid var(--beige-border); border-radius:8px; padding:16px; margin-bottom:18px; background:#fafbfc;">
            <legend>⚙️ Características</legend>
            <div class="form-grid">
                <div class="data-item"><label>Marca</label><input id="elim-marca" readonly></div>
                <div class="data-item"><label>Modelo</label><input id="elim-modelo" readonly></div>
                <div class="data-item"><label>Año</label><input id="elim-anio" readonly></div>
                <div class="data-item" id="box-cilindro" style="display:none;"><label>Cilindraje</label><input id="elim-cilindraje" readonly></div>
            </div>
        </fieldset>

        <fieldset style="border:1px solid var(--beige-border); border-radius:8px; padding:16px; margin-bottom:18px; background:#fafbfc;">
            <legend>🏛️ Registro</legend>
            <div class="data-item" style="margin-bottom:10px;"><label>Tipo</label><input id="elim-tipo" readonly style="font-weight:600; color:var(--primary);"></div>
            <div class="data-item" style="margin-bottom:10px;"><label>Estación Policial</label><input id="elim-estacion" readonly></div>
            <div class="data-item" style="margin-bottom:10px;"><label>Dirección de Detención</label><input id="elim-dir-det" readonly></div>
            <div class="data-item"><label>Estatus</label><input id="elim-estatus" readonly></div>
        </fieldset>

        <fieldset style="border:1px solid var(--beige-border); border-radius:8px; padding:16px; margin-bottom:18px; background:#fafbfc;">
            <legend>📝 Observaciones</legend>
            <textarea id="elim-obs" rows="2" readonly></textarea>
        </fieldset>

        <button id="btn-eliminar" class="btn-eliminar">🗑️ Eliminar Vehículo del Sistema</button>
        <div id="msg-elim" class="msg"></div>
    </div>
</div>

<!-- ✅ Modal de Confirmación -->
<div id="elim-modal" class="elim-modal">
    <div class="elim-modal-box">
        <h4>⚠️ Confirmar Eliminación</h4>
        <p id="modal-text">¿Está seguro que desea eliminar este vehículo? El registro se archivarán permanentemente en la tabla de vehículos eliminados.</p>
        <div class="elim-btns">
            <button id="btn-confirm-si" class="btn-danger">✅ Sí, Eliminar</button>
            <button id="btn-confirm-no" class="btn-cancel">❌ Cancelar</button>
        </div>
    </div>
</div>
