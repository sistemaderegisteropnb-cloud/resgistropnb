<style>
  :root {
    --primary: #002b5c; --secondary: #c5a028;
    --beige-border: #d4c9a8; --bg: #f4f7fa;
  }
  .registro-form fieldset { border: 1px solid var(--beige-border); border-radius: 8px; padding: 16px; margin-bottom: 18px; background: #fafbfc; }
  .registro-form legend { font-weight: 600; color: var(--primary); font-size: 0.95rem; padding: 0 8px; }
  .hidden-field { display: none; margin-top: 8px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .registro-form label { font-weight: 500; font-size: 0.85rem; margin-bottom: 4px; display: block; }
  .registro-form input, .registro-form select, .registro-form textarea { width: 100%; padding: 9px 10px; border: 1.5px solid var(--beige-border); border-radius: 5px; font-size: 0.9rem; background: #fff; }
  .registro-form input:focus, .registro-form select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,43,92,0.1); }
  .btn-submit { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 15px; }
  .btn-submit:hover { background: var(--secondary); }
  .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }
  .msg { padding: 10px; margin-top: 12px; border-radius: 5px; text-align: center; display: none; }
  .msg.success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
  .msg.error { background: #fde2e2; color: #b91c1c; border: 1px solid #fca5a5; }
  .img-preview { width: 100%; height: auto; max-height: 240px; object-fit: contain; border: 1px solid var(--beige-border); border-radius: 5px; margin-top: 8px; display: none; background: #f8fafc; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .status-badge { background: #dcfce7; color: #15803d; font-weight: 700; padding: 6px 12px; border-radius: 6px; border: 1px solid #86efac; font-size: 0.85rem; letter-spacing: 0.5px; display: inline-block; }
  .cedula-status { font-size: 0.75rem; margin-top: 4px; min-height: 18px; display: flex; align-items: center; gap: 4px; }
  .cedula-status.error { color: #dc2626; font-weight: 500; }
  .cedula-status.success { color: #15803d; }
  .cedula-status.checking { color: #64748b; font-style: italic; }
  .registro-form input.cedula-duplicate { border-color: #dc2626 !important; background: #fef2f2; animation: shake 0.3s; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  
  /* 🔹 Estilos del nuevo Dropdown de Banderas */
  .phone-dropdown-wrapper { position: relative; width: 100%; }
  .phone-options { max-height: 240px; overflow-y: auto; position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1.5px solid var(--beige-border); border-radius: 0 0 5px 5px; z-index: 20; box-shadow: 0 6px 16px rgba(0,0,0,0.12); display: none; margin-top: 2px; }
  .phone-option { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; transition: 0.15s; }
  .phone-option:hover { background: #f8fafc; }
  .phone-option img { width: 20px; height: 14px; object-fit: contain; border-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .phone-option .code { font-weight: 600; min-width: 35px; color: #334155; }
  .phone-option .country { color: #475569; font-size: 0.85rem; }
  .phone-display { border: 1.5px solid var(--beige-border); border-radius: 5px; padding: 9px 10px; background: #fff; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; user-select: none; height: 42px; box-sizing: border-box; }
  .phone-display:active { background: #f1f5f9; }
</style>

        <fieldset>

        <fieldset>

            <div class="form-group"><label>¿Usa Lentes?</label><select id="p_lentes" required onchange="toggleCampo(this, 'det-lentes')"><option value="false">No</option><option value="true">Sí</option></select></div>

            <div class="form-group" style="margin-top:14px;"><label>¿Perforaciones?</label><select id="p_perforaciones" required onchange="activarCampoPerforacion(this)"><option value="false">No</option><option value="true">Sí</option></select></div>
            <div id="box-lugar-perforacion" class="hidden-field" style="margin-top:10px;"><label>Lugar de la perforación</label><input type="text" id="txt_lugar_perforacion" placeholder="Ej: Lóbulo, septum, ombligo, ceja..."></div>

                <div class="form-group"><label>¿Condición Médica?</label><select id="p_cond_medica" required onchange="toggleCampo(this, 'det-cond')"><option value="false">No</option><option value="true">Sí</option></select></div>
                <div id="det-cond" class="hidden-field" style="grid-column: span 2;"><label>Describa condición</label><input type="text" id="txt_cond" placeholder="Describa la condición..."></div>
            </div>
            <div class="form-grid" style="margin-top:12px;">
                <div class="form-group"><label>¿Consume Medicamento?</label><select id="p_medicamento" required onchange="toggleCampo(this, 'det-med')"><option value="false">No</option><option value="true">Sí</option></select></div>
                <div id="det-med" class="hidden-field" style="grid-column: span 2;"><label>Nombre del medicamento</label><input type="text" id="txt_med" placeholder="Nombre del medicamento..."></div>
            </div>
        </fieldset>

        <fieldset>

                <div class="form-group" style="grid-column: span 2;"><label>Dirección de detención</label><input type="text" id="p_direccion_detencion" placeholder="Lugar exacto donde fue detenido"></div>
