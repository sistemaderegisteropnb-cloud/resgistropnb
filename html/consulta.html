<div class="card">
    <h3>🔍 Consulta de Registros</h3>
    <div class="search-controls" style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
        <div class="form-group" style="flex: 1; min-width: 180px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Tipo</label>
            <select id="search-type" style="width: 100%; padding: 10px; border: 1.5px solid var(--beige-border); border-radius: 6px;">
                <option value="personas">👤 Personas</option>
                <option value="vehiculos">🚗 Vehículos</option>
                <option value="todos">📋 Todos</option>
            </select>
        </div>
        <div class="form-group" style="flex: 2; min-width: 220px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Término</label>
            <input type="text" id="search-input" placeholder="Cédula, placa, nombre o fecha" style="width: 100%; padding: 10px; border: 1.5px solid var(--beige-border); border-radius: 6px;">
        </div>
        <button id="btn-search" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; align-self: flex-end;">🔍 Buscar</button>
    </div>
    <div id="search-results" style="margin-top: 15px;">
        <div class="placeholder">Ingrese un término y presione Buscar</div>
    </div>
</div>
